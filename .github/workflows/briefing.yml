name: Daily morning briefing

on:
  # 13:00 UTC ≈ 9am ET (EDT) / 8am ET (EST). Both are morning at the display.
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: briefing
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate data.json
        run: node scripts/generate.mjs
        env:
          # Default to Gemini for the free tier. To switch to Anthropic, set
          # AI_PROVIDER=anthropic and provide ANTHROPIC_API_KEY as a secret.
          AI_PROVIDER: gemini
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # AI_PROVIDER: anthropic
          # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

          # Optional overrides — defaults are New York City, ET.
          # LATITUDE: "40.7128"
          # LONGITUDE: "-74.0060"
          # LOCATION_NAME: "New York City"
          # TIMEZONE: "America/New_York"
          # TRENDS_GEO: "US"

      - name: Commit and push if changed
        run: |
          git config user.name  "morning-board-bot"
          git config user.email "morning-board-bot@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No changes to data.json"
          else
            git commit -m "chore: refresh briefing $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
